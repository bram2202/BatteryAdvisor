<div class="card flex justify-center">
  <div class="flex flex-col gap-2">
    <label for="username">Home Assistant URL</label>
    <input
      pInputText
      id="username"
      aria-describedby="username-help"
      [(ngModel)]="homeAssistantUrl"
    />

    <label for="password">Home Assistant Long-Lived Access Token</label>
    <input
      pInputText
      id="password"
      aria-describedby="password-help"
      [(ngModel)]="homeAssistantToken"
    />

    <p-button label="Test Connection" (onClick)="testConnection()"/>
  </div>
</div>
